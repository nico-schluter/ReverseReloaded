<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Mesh wireframe: triangulated surface -->
  <g fill="none" stroke="#6A6A6A" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="15,105 60,22.5 105,105"/>
    <line x1="37.5" y1="63.75" x2="82.5" y2="63.75"/>
    <line x1="26.25" y1="84.375" x2="93.75" y2="84.375"/>
  </g>

  <!-- Fitted plane surface: blue parallelogram in perspective -->
  <polygon points="22.5,41.25 97.5,41.25 90,71.25 30,71.25"
           fill="#0696D7" fill-opacity="0.82"
           stroke="#0479B3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Selected vertex highlights: orange dots at mesh vertices -->
  <circle cx="60"  cy="22.5" r="9" fill="#E87722"/>
  <circle cx="15"  cy="105"  r="9" fill="#E87722"/>
  <circle cx="105" cy="105"  r="9" fill="#E87722"/>
</svg>
