    <polygon points="2,14 8,2 14,14"/>
    <line x1="5" y1="8" x2="11" y2="8"/>
  </g>

  <!-- Fitted plane surface -->
  <polygon points="3,5.5 13,5.5 12,9.5 4,9.5"
